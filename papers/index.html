                var titleHtml = paperUrl ? '<a href="' + escapeHtml(paperUrl) + '">' + titleInner + '</a>' : titleInner;
                return '<li class="pi-item">' +
                    '<div class="pi-icon"><i class="fa-solid fa-file-lines"></i></div>' +
                    '<div class="pi-body">' +
                        '<div class="pi-head">' +
                            '<div class="pi-item-title">' + titleHtml + '</div>' +
                            '<div class="pi-item-date">' + escapeHtml(pp.date.month + ' ' + pp.date.year) + '</div>' +
                        '</div>' +
                        '<div class="pi-item-venue"><strong>(' + escapeHtml(pp.abbr + ' ' + pp.date.year) + ')</strong> ' + escapeHtml(pp.publication) + '</div>' +
                        '<div class="pi-item-authors">' + authors + '</div>' +
                        linksHtml + tagsHtml +
                    '</div>' +
                '</li>';
            }).join('');
        }
        var pagEl = document.getElementById('pi-pagination');
        if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
        var pag = '<button class="pi-page-btn" ' + (currentPage === 1 ? 'disabled' : '') + ' data-page="' + (currentPage - 1) + '">&laquo; Prev</button>';
        pag += '<span class="pi-page-info">Page ' + currentPage + ' of ' + totalPages + '</span>';
        pag += '<button class="pi-page-btn" ' + (currentPage === totalPages ? 'disabled' : '') + ' data-page="' + (currentPage + 1) + '">Next &raquo;</button>';
        pagEl.innerHTML = pag;
        pagEl.querySelectorAll('.pi-page-btn').forEach(function(btn) {
            btn.addEventListener('click', function() { if (!this.disabled) { currentPage = parseInt(this.dataset.page); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
        });
    }

    // Clicking a tag pill on a card filters by that tag.
    document.getElementById('pi-paper-list').addEventListener('click', function(e) {
        if (e.target.classList.contains('pi-tag')) setTag(e.target.dataset.tag);
    });

    document.getElementById('pi-searchbox').addEventListener('input', function() { currentPage = 1; render(); });
    renderTags();
    render();
})();
</script>
